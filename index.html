<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Language | Portfolio 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="selectorstyle.css">
</head>
<body>

    <div class="gateway-container">
        <header class="logo">
            <img src="Sprayman.png" alt="My Logo" style="height: 70px;">
        </header>

        <main class="selection-area">
            <h1>Select your language</h1>
            <div class="lang-options">
                <a href="/en/index.html" class="lang-card">
                    <span class="lang-name">English</span>
                    <span class="lang-code">EN</span>
                </a>
                <a href="/id/index.html" class="lang-card">
                    <span class="lang-name">Bahasa Indonesia</span>
                    <span class="lang-code">ES</span>
                </a>
            </div>
        </main>

        <footer>
            &copy; 2026 Digital Portfolio
        </footer>
    </div>

</body>
</html>
